name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site
        env:
          PUBLIC_BUILD_VERSION: ${{ github.sha }}-${{ github.run_number }}

      - name: Push build output to deploy branch
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git rev-parse --short HEAD)-$(date +%Y%m%d)
          git clone --branch deploy --single-branch \
            "https://x-access-token:${TOKEN}@github.com/Poonwahj/FishSauceGames.git" \
            /tmp/deploy-repo || \
          git clone \
            "https://x-access-token:${TOKEN}@github.com/Poonwahj/FishSauceGames.git" \
            /tmp/deploy-repo
          cd /tmp/deploy-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B deploy
          git rm -rf . --quiet 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/site/dist/. .
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" || (git commit -m "Deploy $VERSION" && git push origin deploy)

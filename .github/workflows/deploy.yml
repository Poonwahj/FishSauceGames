name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install workloads
        run: dotnet workload restore FishSauceGames/FishSauceGames.csproj

      - name: Publish
        run: |
          VERSION=$(git rev-parse --short HEAD)-$(date +%Y%m%d)
          dotnet publish FishSauceGames/FishSauceGames.csproj -c Release -o publish /p:InformationalVersion=$VERSION

      - name: Push publish output to deploy branch
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --branch deploy --single-branch \
            "https://x-access-token:${TOKEN}@github.com/Poonwahj/FishSauceGames.git" \
            /tmp/deploy-repo || \
          git clone \
            "https://x-access-token:${TOKEN}@github.com/Poonwahj/FishSauceGames.git" \
            /tmp/deploy-repo
          cd /tmp/deploy-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B deploy
          git rm -rf . --quiet 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/publish/wwwroot/. .
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" || (git commit -m "Deploy build" && git push origin deploy)
